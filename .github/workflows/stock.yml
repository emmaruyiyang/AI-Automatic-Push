name: stock-push

on: # 3 triggers: schedule and manual
  schedule: 
    - cron: '30 1 * * 1-5'  # 09:30 BJT, Mon-Fri
    - cron: '0 7 * * 1-5'   # 15:00 BJT, Mon-Fri
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Push stock data to Feishu
        run: python push_stock.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
